[tools]
node = "24" # for npm
pnpm = "11"
"github:azu/dockerfile-pin" = "latest"
"github:k1LoW/mo" = "latest"
"npm:cc-sdd" = "latest"
"npm:ccstatusline" = "latest"
"npm:difit" = "latest"

uv = "latest"

claude = "latest"

[tools."github:mono0x/git-default-branch"]
version = "latest"
bin = "git-default-branch"

[settings]
experimental = true
disable_backends = ["asdf", "vfox"]
install_before = "2d"

[settings.github]
use_git_credentials = true

[settings.npm]
package_manager = "pnpm"

[settings.pipx]
uvx = true

[settings.python]
compile = false

[shell_alias]
sudo = "sudo " # trailing space lets the following word expand as an alias too
sudoe = "sudo -e"
vi = "nvim"
git = "hub"
g = "git"
ga = "git add"
gd = "git di"
gf = "git fetch --all"
gg = "git grep -H --heading -I --line-number --break --show-function"
gl = "git log"
gs = "git status"
ll = "ls -l"
la = "ls -A"
lla = "ls -Al"
k = "kubectl"
