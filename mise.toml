[bootstrap.packages]
"brew:sheldon" = "latest"
"brew:zsh" = "latest"

[bootstrap.macos.dock]
autohide = true
show_recents = false

[bootstrap.macos.keyboard]
key_repeat = 2
initial_key_repeat = 15
press_and_hold = false

[bootstrap.macos.trackpad]
tap_to_click = true

[bootstrap.user]
login_shell = "/opt/homebrew/bin/zsh"

[env]
_.path = ["/opt/homebrew/bin", "/opt/homebrew/sbin", "./bin"]

[tools]
"github:afadesigns/zshellcheck" = "1.7.1"
"github:goss-org/goss" = "0.4.9"
actionlint = "1.7.12"
chezmoi = "2.71.0"
dprint = "0.55.1"
hk = "1.50.0"
pkl = "0.32.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"
zizmor = "1.26.1"

[tasks.bootstrap]
run = [
  "chezmoi apply",
]

[tasks.zsh-bench]
run = "hyperfine -w 5 -r 50 'zsh -i -c exit'"

[tasks.zsh-prof]
run = "zsh -i -c exit"
env.ZPROF = "1"

[shell_alias]
cz = "chezmoi"
