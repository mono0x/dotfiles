[tools]
"npm:ccstatusline" = "latest"
claude = "latest"
codex = "latest"
node = "24" # for npm
pnpm = "11"
uv = "latest"

[tools."github:mono0x/git-default-branch"]
version = "latest"
bin = "git-default-branch"

[settings]
experimental = true
disable_backends = ["asdf", "vfox"]
minimum_release_age = "2d"
minimum_release_age_excludes = [
  "claude",
  "codex",
  "node",
  "pnpm",
  "uv",
]

[settings.github]
use_git_credentials = true

[settings.npm]
package_manager = "pnpm"

[settings.pipx]
uvx = true

[settings.python]
compile = false

[shell_alias]
git = "hub"
sudo = "sudo " # trailing space lets the following word expand as an alias too
sudoe = "sudo -e"
vi = "nvim"
zed = "/Applications/Zed.app/Contents/MacOS/cli --classic" # https://github.com/zed-industries/zed/pull/59415
